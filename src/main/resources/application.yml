server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: token-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/payments_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  security:
    jwt:
      secret: ${JWT_SECRET:myProductionSecretKey123456789012345678901234567890}
      expiration: ${JWT_EXPIRATION:86400000}

# Application Configuration
app:
  name: "Fintech Payment Token Service"
  version: "1.0.0"
  description: "Secure payment token management service"
  
# Token Configuration
token:
  cache:
    ttl: 3600
  max-active-per-user: 10
  cleanup:
    interval: 3600000 # 1 hour in milliseconds

# Encryption Configuration
encryption:
  key: ${ENCRYPTION_KEY:myDefaultEncryptionKey123}

# Logging Configuration
logging:
  level:
    com.example.tokenservice: INFO
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/token-service.log
    max-size: 10MB
    max-history: 30

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

logging:
  level:
    com.example.tokenservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.example.tokenservice: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    root: WARN
